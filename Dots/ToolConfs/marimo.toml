
# link to $HOME/.config/marimo/marimo.toml

[save]
autosave = "after_delay"
format_on_save = false
autosave_delay = 1000

[completion]
signature_hint_on_typing = false
activate_on_typing = true
copilot = "custom"

[keymap]
preset = "default"
[keymap.overrides]

[package_management]
manager = "pip"

[mcp]
presets = []

[mcp.mcpServers]

[diagnostics]
sql_linter = true

[experimental]
server_side_pdf_export = true

[snippets]
include_default_snippets = true
custom_paths = []

[language_servers.pylsp]
enable_pydocstyle = false
enable_mypy = true
enable_pylint = false
enabled = false
enable_ruff = true
enable_pyflakes = false
enable_flake8 = false

[server]
browser = "default"
follow_symlink = false

[ai]
inline_tooltip = true
[ai.models]
displayed_models = ["local/Qwen/Qwen3.5-4B"]
custom_models = ["local/Qwen/Qwen3.5-4B"]
autocomplete_model = "local/Qwen/Qwen3.5-4B"
edit_model = "local/Qwen/Qwen3.5-4B"
chat_model = "local/Qwen/Qwen3.5-4B"

[ai.custom_providers]
[ai.custom_providers.local]
base_url = "http://127.0.0.1:2080/v1"

[ai.custom_providers.local_vllm]
base_url = "http://127.0.0.1:8000/v1"

[display]
reference_highlighting = true
default_table_page_size = 10
default_table_max_columns = 50
cell_output = "below"
dataframes = "rich"
theme = "light"
code_editor_font_size = 14
default_width = "medium"

[formatting]
line_length = 79

[runtime]
auto_reload = "off"
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000
on_cell_change = "autorun"
default_csv_encoding = "utf-8"
reactive_tests = true
auto_instantiate = false
default_sql_output = "auto"
output_max_bytes = 8000000
