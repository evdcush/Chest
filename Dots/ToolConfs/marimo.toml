[snippets]
custom_paths = []
include_default_snippets = true

[formatting]
line_length = 79

[diagnostics]
sql_linter = true

[mcp]
presets = []
[mcp.mcpServers]

[language_servers.pylsp]
enable_mypy = true
enable_ruff = true
enable_pydocstyle = false
enable_pylint = false
enabled = false
enable_flake8 = false
enable_pyflakes = false

[display]
theme = "light"
reference_highlighting = true
dataframes = "rich"
default_table_max_columns = 51
code_editor_font_size = 10
default_width = "full"
default_table_page_size = 13
cell_output = "below"

[keymap]
preset = "default"
[keymap.overrides]

[package_management]
manager = "pip"

[save]
autosave_delay = 1000
format_on_save = false
autosave = "after_delay"

[ai]
inline_tooltip = true
rules = ""
mode = "manual"

[ai.models]
displayed_models = ["local/Qwen/Qwen3.5-4B"]
autocomplete_model = "local/Qwen/Qwen3.5-4B"
chat_model = "local/Qwen/Qwen3.5-4B"
custom_models = ["local/Qwen/Qwen3.5-4B"]
edit_model = "local/Qwen/Qwen3.5-4B"

[ai.custom_providers]
[ai.custom_providers.local]
base_url = "http://127.0.0.1:2080/v1"

[ai.custom_providers.local_vllm]
base_url = "http://127.0.0.1:8000/v1"

[experimental]
server_side_pdf_export = true

[completion]
activate_on_typing = true
copilot = "custom"
signature_hint_on_typing = true

[runtime]
std_stream_max_bytes = 1000000
default_sql_output = "auto"
watcher_on_save = "lazy"
on_cell_change = "autorun"
default_csv_encoding = "utf-8"
auto_reload = "off"
reactive_tests = true
output_max_bytes = 8000000
auto_instantiate = false

[server]
follow_symlink = false
browser = "default"
