[formatting]
line_length = 79

[ai]
rules = ""
mode = "manual"
inline_tooltip = true
[ai.custom_providers.local_vllm]
base_url = "http://127.0.0.1:8000/v1"

[ai.models]
custom_models = ["local_vllm/Qwen/Qwen3.5-4B", "local_vllm/meta-llama/Llama-3.1-8B-Instruct", "local/Qwen/Qwen3.5-4B"]
autocomplete_model = "local_vllm/Qwen/Qwen3.5-4B"
displayed_models = ["local_vllm/Qwen/Qwen3.5-4B"]
chat_model = "local_vllm/Qwen/Qwen3.5-4B"
edit_model = "local_vllm/Qwen/Qwen3.5-4B"

[mcp]
presets = ["marimo"]
[mcp.mcpServers]

[experimental]
server_side_pdf_export = true

[runtime]
reactive_tests = true
on_cell_change = "autorun"
default_csv_encoding = "utf-8"
std_stream_max_bytes = 1000000
default_auto_download = ["ipynb", "html"]
output_max_bytes = 8000000
auto_reload = "off"
auto_instantiate = false
watcher_on_save = "lazy"
default_sql_output = "auto"

[package_management]
manager = "pip"

[save]
autosave = "after_delay"
autosave_delay = 1000
format_on_save = false

[display]
dataframes = "rich"
code_editor_font_size = 10
reference_highlighting = true
default_table_max_columns = 51
cell_output = "below"
default_width = "medium"
default_table_page_size = 13
theme = "light"

[completion]
copilot = "custom"
activate_on_typing = true
signature_hint_on_typing = true

[snippets]
custom_paths = []
include_default_snippets = true

[language_servers.pylsp]
enable_mypy = true
enable_ruff = true
enable_pydocstyle = false
enabled = false
enable_flake8 = false
enable_pyflakes = false
enable_pylint = false

[diagnostics]
sql_linter = true

[server]
follow_symlink = false
browser = "default"

[keymap]
preset = "default"

[keymap.overrides]
